<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drive Upload Demo</title>

<style>
body{
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#1c1c1c;
  padding:25px;
  border-radius:12px;
  width:340px;
  text-align:center;
}
button{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#6c4cff;
  border:none;
  color:#fff;
  border-radius:8px;
  font-size:16px;
}
#msg{
  margin-top:12px;
  font-size:14px;
  word-break:break-word;
}
.error{ color:#ff5c5c; }
.success{ color:#4cff7a; }
.warn{ color:#ffc14c; }
a{ color:#6ca0ff; }
</style>
</head>

<body>
<div class="box">
  <h3>📤 Drive Upload Demo</h3>
  <input type="file" id="file"><br>
  <button onclick="upload()">Upload</button>
  <div id="msg"></div>
</div>

<script>
const API_URL = "https://drive-backend-j1qs.onrender.com/upload";

async function upload(){
  const see = document.getElementById("msg");
  const file = document.getElementById("file").files[0];

  if(!file){
    see.innerHTML = "<span class='warn'>⚠️ No file selected</span>";
    return;
  }

  // Client-side size warning (optional)
  if(file.size > 1024 * 1024 * 1024){
    see.innerHTML = "<span class='warn'>⚠️ File too large (max 1GB)</span>";
    return;
  }

  const form = new FormData();
  form.append("file", file);

  see.innerHTML = "⏳ Uploading...";

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    let data;
    try {
      data = await res.json();
    } catch {
      throw new Error("Server returned invalid JSON (possible crash)");
    }

    // ❌ Backend error
    if(!res.ok){
      see.innerHTML = `
        <span class="error">❌ Upload Failed</span><br>
        <b>Status:</b> ${res.status}<br>
        <b>Reason:</b> ${data.error || "Unknown server error"}
      `;
      explainCommonErrors(data.error);
      return;
    }

    // ❌ API returned success:false
    if(!data.success){
      see.innerHTML = `
        <span class="error">❌ Upload Failed</span><br>
        <b>Reason:</b> ${data.error}
      `;
      explainCommonErrors(data.error);
      return;
    }

    // ✅ Success
    see.innerHTML = `
      <span class="success">✅ Upload Successful</span><br>
      <a href="${data.viewLink}" target="_blank">🔗 View File</a>
    `;

  } catch(err){
    // Network / CORS / Backend down
    see.innerHTML = `
      <span class="error">❌ Failed to Fetch</span><br>
      <b>Possible reasons:</b><br>
      • Backend down<br>
      • CORS blocked<br>
      • Internet issue<br><br>
      <small>${err.message}</small>
    `;
  }
}

// Extra explanation helper
function explainCommonErrors(msg){
  if(!msg) return;

  let extra = "<br><br><b>🔍 Possible Causes:</b><br>";

  if(msg.includes("Invalid JWT")){
    extra += "• Service Account key is invalid or disabled<br>";
    extra += "• JSON pasted wrong in Render ENV<br>";
  }
  else if(msg.includes("invalid_grant")){
    extra += "• Old/disabled service account key<br>";
    extra += "• Time mismatch (server vs Google)<br>";
  }
  else if(msg.includes("storage quota")){
    extra += "• Uploading outside Shared Drive<br>";
    extra += "• supportsAllDrives missing<br>";
  }
  else if(msg.includes("No file")){
    extra += "• File field name must be <b>file</b><br>";
  }
  else{
    extra += "• Check Render logs for exact reason<br>";
  }

  document.getElementById("msg").innerHTML += extra;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drive Upload Demo</title>
  <style>
    body {
      background:#0f0f0f;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }
    .box {
      background:#1c1c1c;
      padding:25px;
      border-radius:12px;
      width:320px;
      text-align:center;
    }
    button {
      margin-top:15px;
      padding:10px;
      width:100%;
      background:#6c4cff;
      border:none;
      color:#fff;
      border-radius:8px;
      font-size:16px;
    }
    #msg { margin-top:10px; }
  </style>
</head>
<body>

<div class="box">
  <h3>Drive Upload Demo</h3>
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>
  <div id="msg"></div>
</div>

<script>
async function upload(){
  const file = document.getElementById("file").files[0];
  if(!file){
    msg.innerText = "No file selected";
    return;
  }

  const form = new FormData();
  form.append("file", file);

  msg.innerText = "Uploading...";

  try {
    const res = await fetch(
      "https://drive-backend-hiws.onrender.com/upload",
      {
        method: "POST",
        body: form
      }
    );
    const data = await res.json();

    if(data.success){
      msg.innerHTML = `
        ✅ Uploaded <br>
        <a href="${data.viewLink}" target="_blank">View File</a>
      `;
    } else {
      msg.innerText = "❌ Upload failed";
    }
  } catch (e) {
    msg.innerText = "❌ Failed to fetch";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Drive Upload Demo</title>
</head>
<body style="background:#111;color:#fff;text-align:center;padding:50px">

  <h2>Drive Upload Demo</h2>

  <input type="file" id="fileInput" />
  <br><br>

  <button onclick="upload()">Upload Video</button>

  <p id="status"></p>

  <script>
    async function upload() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) {
        alert("Select a file");
        return;
      }

      const formData = new FormData();
      formData.append("file", file); // 🔴 MUST be "file"

      document.getElementById("status").innerText = "Uploading...";

      try {
        const res = await fetch(
          "https://drive-backend-97p2.onrender.com/upload",
          {
            method: "POST",
            body: formData
          }
        );

        const data = await res.json();

        if (data.success) {
          document.getElementById("status").innerHTML =
            `✅ Uploaded<br><a href="${data.viewLink}" target="_blank">View in Drive</a>`;
        } else {
          document.getElementById("status").innerText =
            "❌ Failed: " + (data.error || "Unknown error");
        }
      } catch (e) {
        document.getElementById("status").innerText =
          "❌ Upload Failed (Network / Server)";
      }
    }
  </script>

</body>
</html>

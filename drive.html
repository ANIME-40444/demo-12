<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drive Upload Demo</title>
  <style>
    body {
      background:#0f0f0f;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }
    .box {
      background:#1c1c1c;
      padding:25px;
      border-radius:12px;
      width:340px;
      text-align:center;
    }
    button {
      margin-top:15px;
      padding:10px;
      width:100%;
      background:#6c4cff;
      border:none;
      color:#fff;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }
    #msg {
      margin-top:12px;
      font-size:14px;
      word-break: break-word;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>Drive Upload Demo</h3>
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>
  <div id="msg"></div>
</div>

<script>
const msg = document.getElementById("msg");

async function upload(){
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if(!file){
    msg.style.color = "orange";
    msg.innerText = "⚠️ No file selected";
    return;
  }

  const form = new FormData();
  form.append("file", file);

  msg.style.color = "#aaa";
  msg.innerText = "⏳ Uploading...";

  try {
    const res = await fetch(
      "https://drive-backend-hiws.onrender.com/upload",
      {
        method: "POST",
        body: form
      }
    );

    let data;
    try {
      data = await res.json();
    } catch {
      throw new Error("Invalid JSON response from server");
    }

    if (!res.ok) {
      throw new Error(data.error || `HTTP Error ${res.status}`);
    }

    if (data.success) {
      msg.style.color = "lightgreen";
      msg.innerHTML = `
        ✅ Upload successful<br>
        <a href="${data.viewLink}" target="_blank" style="color:#6c4cff">
          View File
        </a>
      `;
    } else {
      throw new Error(data.error || "Unknown upload error");
    }

  } catch (err) {
    msg.style.color = "red";
    msg.innerHTML = `
      ❌ Upload failed<br>
      <small>${err.message}</small>
    `;
  }
}
</script>

</body>
</html>
